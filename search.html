<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Result Portal - Cyber Intelligence Test</title>
    <!-- Favcion -->
    <link rel="shortcut icon" href="assets/img/favicon.svg">
    <!-- Bootstrap min.css -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <!-- All Min Css -->
    <link rel="stylesheet" href="assets/css/all.min.css">
    <!-- Main.css -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/color.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-green: #4facfe;
            --cyber-dark: #030a16;
        }

        body {
            background-color: var(--cyber-dark);
            font-family: 'Rajdhani', sans-serif;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        /* Digital Grid Background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
            pointer-events: none;
        }

        .search-hero {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* Hexagon / Circuit decorative overlay */
        .cyber-bg-icon {
            position: absolute;
            font-size: 300px;
            color: rgba(0, 242, 254, 0.02);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .search-title {
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
            text-align: center;
        }

        .search-container {
            width: 100%;
            max-width: 550px;
            background: rgba(13, 25, 43, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 4px; /* Industrial style */
            padding: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.15);
            transition: all 0.3s ease;
            position: relative;
        }

        .search-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--neon-blue);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 18px;
            color: #ffffff;
            font-size: 16px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            outline: none;
        }

        .search-container input::placeholder {
            color: rgba(143, 161, 188, 0.6);
            letter-spacing: 1px;
        }

        .search-btn {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            border: none;
            color: #030a16;
            padding: 14px 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .search-btn:hover {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
            transform: translateY(-1px);
        }

        #errorMsg {
            color: #ff0055;
            margin-top: 20px;
            font-weight: bold;
            display: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }
        #header-sticky {
            background: rgba(3, 10, 22, 0.98) !important;
            backdrop-filter: blur(10px) !important;
            border-bottom: 1px solid rgba(0, 242, 254, 0.2) !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5) !important;
        }
        #header-sticky .main-menu ul li a {
            color: #ffffff !important;
        }
        
        /* Cybersecurity Loading Overlay */
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 10, 22, 0.98);
            z-index: 9999;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .loader-content {
            text-align: center; max-width: 480px; width: 90%;
        }
        .matrix-spinner {
            width: 50px; height: 50px; border: 3px solid rgba(0, 242, 254, 0.1);
            border-top: 3px solid var(--neon-blue); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loader-title { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 16px; margin-bottom: 15px; letter-spacing: 1px; }
        .loading-bar-container {
            background: rgba(255, 255, 255, 0.03); height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 12px; border: 1px solid rgba(0, 242, 254, 0.2);
        }
        .loading-bar { height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-green)); width: 0%; transition: width 0.1s linear; }
        .loading-status { color: #aebccf; font-size: 14px; margin-bottom: 12px; font-style: italic; }
        .loading-logs { font-family: 'Courier New', monospace; font-size: 11px; color: #4facfe; text-align: left; height: 120px; overflow-y: scroll; background: rgba(0, 0, 0, 0.4); padding: 10px; border-radius: 4px; border: 1px solid rgba(0, 242, 254, 0.1); line-height: 1.4; }
        .loading-logs::-webkit-scrollbar { width: 4px; }
        .loading-logs::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.3); }
    </style>
</head>
<body>

    <!-- Cyber Loading Screen Overlay -->
    <div class="loader-overlay" id="loader">
        <div class="loader-content">
            <div class="matrix-spinner"></div>
            <div class="loader-title">DATABASE BYPASS IN PROGRESS</div>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadBar"></div>
            </div>
            <div class="loading-status" id="loadStatus">Initializing secure socket...</div>
            <div class="loading-logs" id="loadLogs"></div>
        </div>
    </div>

    <!-- Header Section Start -->
    <header id="header-sticky" class="header-1 style-2">
        <div class="container-fluid">
            <div class="mega-menu-wrapper">
                <div class="header-main">
                    <div class="logo">
                        <a href="index.html" class="header-logo-3">
                            <img src="assets/img/logo/black-logo.svg" alt="logo-img">
                        </a>
                    </div>
                    <div class="mean__menu-wrapper">
                        <div class="main-menu">
                            <nav id="mobile-menu">
                                <ul>
                                        <li>
                                            <a href="index.html">Home</a>
                                        </li>
                                        <li>
                                            <a href="about.html">About</a>
                                        </li>
                                        <li>
                                            <a href="search.html">Results</a>
                                        </li>
                                        <li>
                                            <a href="contact.html">Contact Us</a>
                                        </li>
                                    </ul>
                            </nav>
                        </div>
                    </div>
                    <div class="header-right d-flex justify-content-end align-items-center">
                        <div class="main-button">
                            <a href="contact.html"> <span class="theme-btn"> Get Started </span><span class="arrow-btn"><i class="fa-regular fa-arrow-up-right"></i></span></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Search Section -->
    <section class="search-hero">
        <div class="cyber-bg-icon"><i class="fa-solid fa-shield-halved"></i></div>
        
        <h1 class="search-title">Cyber Intelligence Test Result Portal</h1>
        
        <div class="search-container">
            <input type="text" id="certInput" placeholder="Enter your Roll Number">
            <button class="search-btn" onclick="verifyCert()">Search</button>
        </div>
        <p id="errorMsg"><i class="fa-solid fa-triangle-exclamation mr-1"></i> ACCESS DENIED: ROLL NUMBER NOT REGISTERED.</p>
    </section>

    <script>
        const logs = [
            "Handshake initialized. Establishing SSL Tunnel...",
            "Bypassing secure firewall buffer overlays...",
            "Decrypting result index token references...",
            "Accessing subverted root DB directory...",
            "Querying credentials for payload index 926289...",
            "Verification code successful. Bypassing compliance check...",
            "Extracting scorecard matrix parameters securely...",
            "Bypassing image buffer security lockouts...",
            "Compiling secure document payload cache...",
            "Access tunnels finalized. Results on the way..."
        ];

        function verifyCert() {
            var input = document.getElementById('certInput').value.trim();
            if (input === '926289') {
                document.getElementById('errorMsg').style.display = 'none';
                
                const loader = document.getElementById('loader');
                const loadBar = document.getElementById('loadBar');
                const loadStatus = document.getElementById('loadStatus');
                const loadLogs = document.getElementById('loadLogs');

                loader.style.display = 'flex';
                loadLogs.innerHTML = ""; // Clear logs
                
                let progress = 0;
                let logIndex = 0;

                const interval = setInterval(() => {
                    progress += 1;
                    loadBar.style.width = progress + '%';
                    
                    // Update log comments every 10% milestone
                    if (progress % 10 === 0 && logIndex < logs.length) {
                        loadStatus.innerText = logs[logIndex];
                        loadLogs.innerHTML += `<div style="color: #00f2fe; margin-bottom: 3px;">> [${new Date().toLocaleTimeString()}] ${logs[logIndex]}</div>`;
                        loadLogs.scrollTop = loadLogs.scrollHeight;
                        logIndex++;
                    }

                    if (progress >= 100) {
                        clearInterval(interval);
                        setTimeout(() => {
                            loader.style.display = 'none';
                            window.location.href = 'result.html';
                        }, 500); // Small buffer before opening
                    }
                }, 100); // 100ms x 100 steps = 10s (10 Seconds Loading)
                
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        document.getElementById('certInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyCert();
            }
        });
    </script>

</body>
</html>
