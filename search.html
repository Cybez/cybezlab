<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Result Portal - Cyber Intelligence Test</title>
    <!-- Favcion -->
    <link rel="shortcut icon" href="assets/img/favicon.svg">
    <!-- Bootstrap min.css -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <!-- All Min Css -->
    <link rel="stylesheet" href="assets/css/all.min.css">
    <!-- Main.css -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/color.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-green: #4facfe;
            --cyber-dark: #030a16;
        }

        body {
            background-color: var(--cyber-dark);
            font-family: 'Rajdhani', sans-serif;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        /* Digital Grid Background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
            pointer-events: none;
        }

        .search-hero {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* Hexagon / Circuit decorative overlay */
        .cyber-bg-icon {
            position: absolute;
            font-size: 300px;
            color: rgba(0, 242, 254, 0.02);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .search-title {
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
            text-align: center;
        }

        .search-container {
            width: 100%;
            max-width: 550px;
            background: rgba(13, 25, 43, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 4px; /* Industrial style */
            padding: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.15);
            transition: all 0.3s ease;
            position: relative;
        }

        .search-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--neon-blue);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 18px;
            color: #ffffff;
            font-size: 16px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            outline: none;
        }

        .search-container input::placeholder {
            color: rgba(143, 161, 188, 0.6);
            letter-spacing: 1px;
        }

        .search-btn {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            border: none;
            color: #030a16;
            padding: 14px 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .search-btn:hover {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
            transform: translateY(-1px);
        }

        #errorMsg {
            color: #ff0055;
            margin-top: 20px;
            font-weight: bold;
            display: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }
        #header-sticky {
            background: rgba(3, 10, 22, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <!-- Header Section Start -->
    <header id="header-sticky" class="header-1 style-2">
        <div class="container-fluid">
            <div class="mega-menu-wrapper">
                <div class="header-main">
                    <div class="logo">
                        <a href="index.html" class="header-logo-3">
                            <img src="assets/img/logo/black-logo.svg" alt="logo-img">
                        </a>
                    </div>
                    <div class="mean__menu-wrapper">
                        <div class="main-menu">
                            <nav id="mobile-menu">
                                <ul>
                                        <li>
                                            <a href="index.html">Home</a>
                                        </li>
                                        <li>
                                            <a href="about.html">About</a>
                                        </li>
                                        <li>
                                            <a href="search.html">Results</a>
                                        </li>
                                        <li>
                                            <a href="contact.html">Contact Us</a>
                                        </li>
                                    </ul>
                            </nav>
                        </div>
                    </div>
                    <div class="header-right d-flex justify-content-end align-items-center">
                        <div class="main-button">
                            <a href="contact.html"> <span class="theme-btn"> Get Started </span><span class="arrow-btn"><i class="fa-regular fa-arrow-up-right"></i></span></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Search Section -->
    <section class="search-hero">
        <div class="cyber-bg-icon"><i class="fa-solid fa-shield-halved"></i></div>
        
        <h1 class="search-title">Cyber Intelligence Test Result Portal</h1>
        
        <div class="search-container">
            <input type="text" id="certInput" placeholder="Enter your Roll Number">
            <button class="search-btn" onclick="verifyCert()">Search</button>
        </div>
        <p id="errorMsg"><i class="fa-solid fa-triangle-exclamation mr-1"></i> ACCESS DENIED: ROLL NUMBER NOT REGISTERED.</p>
    </section>

    <script>
        function verifyCert() {
            var input = document.getElementById('certInput').value.trim();
            if (input === '926289') {
                document.getElementById('errorMsg').style.display = 'none';
                window.open('result.html', '_blank');
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        document.getElementById('certInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyCert();
            }
        });
    </script>

</body>
</html>
